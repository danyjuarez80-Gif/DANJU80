name: Actualizador Dany 80

on:
  schedule:
    # Corre cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch: # Boton manual activo

permissions:
  contents: write  # IMPORTANTE: Permite subir el archivo actualizado

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar Extractor de Canales
        run: python extractor.py

      - name: Guardar cambios en GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
