name: Actualizador Dany 80

on:
  schedule:
    - cron: '*/30 * * * *' # Ejecución cada 30 minutos
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write # Permiso necesario para guardar cambios en el repo

jobs:
  build:
    runs-on: ubuntu-latest # Corregido: antes decía runs-runs-on
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar Extractor
        run: python extractor.py

      - name: Guardar cambios
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
