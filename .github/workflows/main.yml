name: System Maintenance Workflow

on:
  schedule:
    - cron: '*/20 15-23,0-5 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Runtime Dependencies
        run: pip install requests

      - name: Execute Data Sync
        run: python data_processor.py

      - name: Commit System Logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config_backup.cfg system_cache.log
          git diff --cached --quiet || (git commit -m "🔄 Update system cache logs" && git push)
