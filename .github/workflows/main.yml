name: Actualizador de Canales

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ESTA ES LA PARTE QUE FALTA: Dar permiso para escribir en el repositorio
    permissions:
      contents: write

    steps:
      - name: Checkout de repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar script de rastreo
        run: python bot_userland.py

      - name: Guardar cambios en GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Añadimos los archivos. Usamos -f por si acaso alguno está en .gitignore
          git add lista_danju80.m3u progreso.txt || true
          
          # Solo hacemos commit si hay cambios reales
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Actualización automática: canales actualizados"
            git push
          else
            echo "No hay cambios para subir."
          fi
