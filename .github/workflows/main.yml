name: System Maintenance Workflow

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install requests

      - name: Run
        run: python data_processor.py

      - name: Save Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Danju80.txt system_cache.log
          # El "|| true" evita que el bot se cancele si no hay nada nuevo
          git commit -m "🔄 Sincronizacion masiva de canales" || true
          git push
