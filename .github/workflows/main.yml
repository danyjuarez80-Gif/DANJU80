name: System Maintenance Workflow

on:
  schedule:
    # Corre cada 20 minutos durante las horas de mayor actividad (9am - 12am MX aprox)
    - cron: '*/20 15-23,0-6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Data Sync
        run: python data_processor.py

      - name: Save Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Agregamos los archivos con nombres discretos
          git add Danju80.txt system_cache.log
          # Solo hace el commit si los archivos cambiaron realmente
          git diff --cached --quiet || (git commit -m "🔄 Update system logs" && git push)
