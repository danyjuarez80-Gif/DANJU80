name: System Maintenance Workflow

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run Magic
        run: python data_processor.py

      - name: Save
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Danju80.txt DANJU80 system_cache.log
          git commit -m "🔄 Registro de canales sin pérdida de avances" || exit 0
          git push
