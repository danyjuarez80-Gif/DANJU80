name: Actualizador de Canales

on:
  schedule:
    # Se ejecuta cada 15 minutos según tu configuración preferida
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout de repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar script de rastreo
        run: python bot_userland.py

      - name: Guardar cambios en GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Agregamos los archivos m3u y el archivo de memoria progreso.txt
          git add lista_danju80.m3u progreso.txt
          # Solo hacemos commit si realmente hubo cambios para evitar errores
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática: bloque de 10 canales" && git push)
