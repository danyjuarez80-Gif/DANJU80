name: Actualizador Dany TV

on:
  workflow_dispatch: # Botón manual
  push:
    paths:
      - 'DANJU80'    # Actualiza al instante si tú editas el archivo
  schedule:
    - cron: '*/15 * * * *' # ACTUALIZACIÓN CADA 15 MINUTOS AUTOMÁTICA

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Ejecutar Extractor de Canales
        run: python extractor.py

      - name: Guardar cambios en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add lista_dany.m3u
          git commit -m "Refresco automático cada 15 min" || exit 0
          git push
