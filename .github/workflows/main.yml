name: System Maintenance Workflow

on:
  schedule:
    - cron: '*/20 15-23,0-6 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    # Subimos a 8 min para que alcance a guardar los cambios antes de que lo corten
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Data Sync
        run: python data_processor.py

      - name: Save Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Danju80.txt system_cache.log
          git diff --cached --quiet || (git commit -m "🔄 Quick update" && git push)
