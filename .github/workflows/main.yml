name: Actualizador Dany 80

on:
  schedule:
    # Se ejecuta cada 30 minutos para mantener los enlaces actualizados
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite que lo ejecutes manualmente desde la pestaña Actions

permissions:
  contents: write  # Crucial: permite que el bot guarde el archivo .m3u en tu repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar Extractor de Canales
        run: python extractor.py

      - name: Guardar cambios en GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # El comando || exit 0 evita que la acción marque error si no hay
