name: Actualizador de Canales

on:
  schedule:
    # Se ejecuta cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch: # Esto permite que lo actives tú manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    # Añadimos permisos para que el bot pueda escribir en tu repositorio
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
