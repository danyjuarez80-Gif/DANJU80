name: Actualizar Lista Danju80 Cada 15 Minutos

on:
  schedule:
    # Corre automáticamente cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch: # Activa el botón para correrlo manual cuando quieras

permissions:
  contents: write # Permiso obligatorio para guardar los cambios en tu GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Por si usas requests para bajar tu lista original
          pip install requests || true

      - name: Ejecutar Extractor y Limpiador
        run: python danju80.py # <-- Ya corregido con el nombre de tu script

      - name: Guardar Cambios en GitHub (Git Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Agrega la lista filtrada que genera el script
          git add lista_canales
