name: Filtrar y Actualizar Canales IPTV

on:
  workflow_dispatch: # Activa el botón gris para correrlo cuando tú quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Ejecutar script de filtrado
      run: python actualizar_lista.py

    - name: Guardar los cambios en el repositorio
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add lista_canales_render.txt || echo "No se genero el archivo"
        git commit -m "Lista actualizada automaticamente" || echo "No hay cambios"
        git push
