name: Actualizar Lista Danju80 Cada 15 Minutos

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Crear y Ejecutar Filtro Local
        run: |
          cat << 'EOF' > extractor_automatico.py
          import os

          # Archivo de origen que ya tienes en tu GitHub
          archivo_origen = "dan88.m3u" 
          
          if not os.path.exists(archivo_origen):
              # Por si acaso tiene el nombre viejo en minúsculas o variaciones
              if os.path.exists("dan28.m3u"):
                  archivo_origen = "dan28.m3u"
          
          try:
              print(f"Abriendo archivo local: {archivo_origen}")
              with open(archivo_origen, "r", encoding="utf-8", errors="ignore") as f_origen:
                  lineas = f_origen.splitlines()
                  
              lineas_filtradas = []
              skip_next = False
              
              if lineas and lineas[0].startswith("#EXTM3U"):
                  lineas_filtradas.append(lineas[0])
              
              for i in range(1, len(lineas)):
                  linea = lineas[i].strip()
                  
                  if skip_next:
                      if linea.startswith("http"):
                          lineas_filtradas.append(linea)
                      skip_next = False
                      continue
                      
                  if linea.startswith("#EXTINF"):
                      linea_lower = linea.lower()
                      url_abajo = ""
                      if i + 1 < len(lineas):
                          url_abajo = lineas[i + 1].lower()
                      
                      # Volamos todo el VOD pesado (Películas, Series y formatos multimedia)
                      es_vod = (
                          "/movie/" in url_abajo or 
                          "/series/" in url_abajo or 
                          ".mp4" in url_abajo or 
                          ".mkv" in url_abajo or
                          'group-title="películas"' in linea_lower or
                          'group-title="series"' in linea_lower or
                          'group-title="vod"' in linea_lower
                      )
                      
                      if not es_vod:
                          lineas_filtradas.append(linea)
                          skip_next = True
                          
              # Guardamos el resultado en tu archivo destino final
              with open("DANJU80", "w", encoding="utf-8") as f_destino:
                  f_destino.write("\n".join(lineas_filtradas))
              print("¡Archivo DANJU80 actualizado localmente desde la base m3u!")
              
              # Actualizamos el render txt apuntando a la lista limpia
              with open("lista_canales_render.txt", "w", encoding="utf-8") as f_render:
                  f_render.write("https://raw.githubusercontent.com/damjuarez80-Gif/DANJU80/main/DANJU80")
              print("¡Archivo lista_canales_render.txt actualizado!")
              
          except Exception as e:
              print(f"Error procesando el filtrado: {e}")
          EOF
          python extractor_automatico.py

      - name: Guardar Cambios en GitHub (Git Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Le decimos a Git que guarde los cambios específicamente en tus archivos reales
          git add DANJU80 lista_canales_render.txt || true
          
          if ! git diff --cached --quiet; then
            git commit -m "Automatización: DANJU80 y render actualizados desde dan88"
            git push origin main
          else
            echo "No hay variaciones detectadas en los canales."
          fi
