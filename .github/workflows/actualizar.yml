name: Actualizar Lista Danju80 Cada 15 Minutos

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # Activa el botón manual en GitHub

permissions:
  contents: write # Permiso crucial para que el bot pueda guardar los dos archivos

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests || true

      - name: Ejecutar Extractor Completo
        # Si tu script está en la raíz, pon el nombre exacto abajo (ej: danju80.py, extractor.py, etc.)
        # Si está dentro de una carpeta, pon: python nombre_carpeta/tu_script.py
        run: python danju80.py 

      - name: Guardar Cambios en GitHub (Git Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Rastrea absolutamente todos los cambios en el repositorio (M3U, render.txt, etc.)
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "Automatización: M3U y render.txt actualizados (Sin películas)"
            git push origin main
          else
            echo "No se detectaron cambios en los archivos."
          fi
