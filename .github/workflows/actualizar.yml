name: Actualizar Lista Danju80 Cada 15 Minutos

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Filtrar Canales VOD y Modificar Archivos
        run: |
          python -c '
          import os

          # 1. Leer la base que subiste ayer
          archivo_origen = "dan88.m3u"
          if not os.path.exists(archivo_origen):
              print("ERROR: No se encontro dan88.m3u en la raiz.")
              exit(1)

          with open(archivo_origen, "r", encoding="utf-8", errors="ignore") as f:
              lineas = f.splitlines()

          lineas_filtradas = []
          skip_next = False

          if lineas and lineas[0].startswith("#EXTM3U"):
              lineas_filtradas.append(lineas[0])

          for i in range(1, len(lineas)):
              linea = lineas[i].strip()
              if skip_next:
                  if linea.startswith("http"):
                      lineas_filtradas.append(linea)
                  skip_next = False
                  continue

              if linea.startswith("#EXTINF"):
                  linea_lower = linea.lower()
                  url_abajo = ""
                  if i + 1 < len(lineas):
                      url_abajo = lineas[i + 1].lower()

                  # Filtro radical anti-peliculas y anti-series
                  es_vod = (
                      "/movie/" in url_abajo or 
                      "/series/" in url_abajo or 
                      ".mp4" in url_abajo or 
                      ".mkv" in url_abajo or
                      "group-title=\"películas\"" in linea_lower or
                      "group-title=\"series\"" in linea_lower or
                      "group-title=\"vod\"" in linea_lower
                  )

                  if not es_vod:
                      lineas_filtradas.append(linea)
                      skip_next = True

          # 2. Forzar la escritura en tu archivo final en mayusculas
          with open("DANJU80", "w", encoding="utf-8") as f_out:
              f_out.write("\n".join(lineas_filtradas))
          print("¡DANJU80 sobreescrito exitosamente!")

          # 3. Forzar la escritura en tu txt de render
          with open("lista_canales_render.txt", "w", encoding="utf-8") as f_render:
              f_render.write("https://raw.githubusercontent.com/damjuarez80-Gif/DANJU80/main/DANJU80")
          print("¡lista_canales_render.txt sobreescrito exitosamente!")
          '

      - name: Sincronizar y Forzar Push a GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Hacemos un pull previo para evitar cualquier conflicto de sincronizacion
          git pull origin main --rebase
          
          # Forzamos el rastreo exacto de tus dos archivos reales
          git add DANJU80 lista_canales_render.txt
          
          if ! git diff --cached --quiet; then
            git commit -m "Filtro Automatico: Canales en vivo listos"
            git push origin main
          else
            echo "Sin cambios detectados en la lista de canales."
          fi
