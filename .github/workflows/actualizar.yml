name: Filtrar y Actualizar Canales IPTV

on:
  workflow_dispatch: # Botón manual para correrlo cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Ejecutar script de filtrado
      run: python actualizar_lista.py

    - name: Guardar los cambios en el repositorio
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Le decimos a git que guarde ambos archivos creados/modificados
        git add lista_canales_render.txt DANJU80 || echo "Error al agregar archivos"
        
        git commit -m "Actualizacion simultanea de DANJU80 y lista_canales_render.txt" || echo "No hay cambios"
        git push
