name: Actualizar Lista Danju80 Cada 15 Minutos

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: pip install requests

      - name: Crear y Ejecutar Filtro de Películas
        run: |
          cat << 'EOF' > filtro_automatico.py
          import requests

          # URL original de tu lista gigante (Cámbiala por tu link si es otra)
          url_m3u_gigante = "https://raw.githubusercontent.com/damjuarez80-Gif/DANJU80/main/lista_canales_en_vivo.m3u" 
          
          try:
              print("Descargando lista...")
              respuesta = requests.get(url_m3u_gigante, timeout=30)
              if respuesta.status_code == 200:
                  lineas = respuesta.text.splitlines()
                  lineas_filtradas = []
                  skip_next = False
                  
                  if lineas and lineas[0].startswith("#EXTM3U"):
                      lineas_filtradas.append(lineas[0])
                  
                  for i in range(1, len(lineas)):
                      linea = lineas[i].strip()
                      
                      if skip_next:
                          if linea.startswith("http"):
                              lineas_filtradas.append(linea)
                          skip_next = False
                          continue
                          
                      if linea.startswith("#EXTINF"):
                          linea_lower = linea.lower()
                          url_abajo = ""
                          if i + 1 < len(lineas):
                              url_abajo = lineas[i + 1].lower()
                          
                          # Volamos películas, series y formatos pesados
                          es_vod = (
                              "/movie/" in url_abajo or 
                              "/series/" in url_abajo or 
                              ".mp4" in url_abajo or 
                              ".mkv" in url_abajo or
                              'group-title="películas"' in linea_lower or
                              'group-title="series"' in linea_lower or
                              'group-title="vod"' in linea_lower
                          )
                          
                          if not es_vod:
                              lineas_filtradas.append(linea)
                              skip_next = True
                              
                  with open("lista_canales_en_vivo.m3u", "w", encoding="utf-8") as f:
                      f.write("\n".join(lineas_filtradas))
                  print("¡Lista filtrada guardada con éxito!")
              else:
                  print(f"Error: Status {respuesta.status_code}")
          except Exception as e:
              print(f"Error en proceso: {e}")
          EOF
          python filtro_automatico.py

      - name: Guardar Cambios en GitHub (Git Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add lista_canales_en_vivo.m3u || true 
          
          if ! git diff --cached --quiet; then
            git commit -m "Automatización: Limpieza radical sin películas ejecutada"
            git push origin main
          else
            echo "No hay cambios nuevos en los canales."
          fi
