name: Actualizar Lista Danju80 Cada 15 Minutos

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar Script de Segmentación
        run: python actualizar_lista.py

      - name: Enviar Cambios a GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Forzamos a Git a registrar absolutamente todas las listas
          git add DANJU80 DANJU_MOVIES DANJU_SERIES lista_canales_render.txt
          
          if ! git diff --cached --quiet; then
            git commit -m "Automatización: Listas puras actualizadas"
            git pull origin main --rebase
            git push origin main
          else
            echo "Sin cambios detectados en las listas."
          fi
